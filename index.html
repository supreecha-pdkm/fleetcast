<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Fleetcast — ระบบพยากรณ์ความต้องการเดินทางด้วย Machine Learning สำหรับกรีน แคปปิตอล ทรานสปอร์ต พยากรณ์จำนวนผู้โดยสารและอัตราบรรทุกรายเส้นทางและรายรอบเดินรถ"
    />
    <meta name="theme-color" content="#f9f9f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23008300' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10H4z'/%3E%3Cpath d='M4 11h16'/%3E%3Ccircle cx='7.5' cy='18.5' r='1.5'/%3E%3Ccircle cx='16.5' cy='18.5' r='1.5'/%3E%3C/svg%3E"
    />
    <title>Fleetcast · ภาพรวมการพยากรณ์ความต้องการเดินทาง</title>
    <script>
      // Resolve the stored theme before first paint to avoid a flash of the
      // wrong palette. Mirrors the logic in src/hooks/useTheme.ts.
      try {
        const stored = localStorage.getItem('fleetcast.theme')
        const dark =
          stored === 'dark' ||
          ((stored === 'system' || stored === null) &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      } catch {
        /* localStorage unavailable — fall back to light. */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
